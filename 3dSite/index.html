<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3d site</title>

    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    
    <div class="container">
        <section class="gallery">

            <div class="frame">
                <h2>С Наступающим Новым годом!</h2>
            </div>

            <div class="frame">
                <div class="frame_content">
                    <div class="frame-media frame-media_left" style="background-image: url(images/1.jpg);" ></div>
                </div>
            </div>

            <div class="frame frame_bg">
                <div class="frame_content">
                    <video class="frame-media frame-media_right" src="media/video_optimized.mp4" autoplay loop muted></video>
                </div>
            </div>

            <div class="frame"></div>


            <div class="frame frame_bg">
                <div class="frame_content">
                    <h3>Желаю вам</h3>
                    <p>В новом 2026 году исполнения всех ваших целей</p>
                </div>
            </div>

            <div class="frame"></div>

            <div class="frame">
                <div class="frame_content">
                    <div class="frame-media frame-media_left" style="background-image: url(images/2.jpg);" ></div>
                </div>
            </div>
            
            
        </section>
    </div>

</body>
</html>
